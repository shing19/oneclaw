name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: rust-${{ matrix.target }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-${{ matrix.target }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecar binary
        working-directory: apps/desktop
        run: bash scripts/build-sidecar.sh ${{ matrix.target }}

      - name: Build Tauri app (.dmg)
        working-directory: apps/desktop
        run: pnpm tauri build --target ${{ matrix.target }} --bundles dmg
        env:
          APPLE_SIGNING_IDENTITY: ""

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.arch }}
          path: apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: rust-x86_64-pc-windows-msvc-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-x86_64-pc-windows-msvc-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecar binary
        working-directory: apps/desktop
        shell: bash
        run: bash scripts/build-sidecar.sh x86_64-pc-windows-msvc

      - name: Build Tauri app (.exe)
        working-directory: apps/desktop
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Linux (.deb + .AppImage)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: rust-x86_64-unknown-linux-gnu-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-x86_64-unknown-linux-gnu-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecar binary
        working-directory: apps/desktop
        run: bash scripts/build-sidecar.sh x86_64-unknown-linux-gnu

      - name: Build Tauri app (.deb + .AppImage)
        working-directory: apps/desktop
        run: pnpm tauri build --target x86_64-unknown-linux-gnu --bundles deb,appimage
        env:
          NO_STRIP: true

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x64-deb
          path: apps/desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 1

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x64-appimage
          path: apps/desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 1

  upload-release:
    name: Upload to GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: desktop-*

      - name: Collect release files and generate checksums
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) \
            -exec cp {} release-files/ \;
          echo "Release files:"
          ls -lh release-files/
          cd release-files
          sha256sum ./* > desktop-checksums.txt
          echo ""
          echo "Checksums:"
          cat desktop-checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
