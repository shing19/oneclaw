name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, Publish, and Release
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate project
        run: pnpm typecheck && pnpm test && pnpm lint

      - name: Build package
        run: pnpm build

      - name: Pack npm tarball
        run: |
          mkdir -p artifacts
          pnpm pack --pack-destination artifacts
          cd artifacts
          sha256sum ./*.tgz > checksums.txt

      - name: Validate tarball content
        run: |
          set -euo pipefail
          tarball="$(ls artifacts/*.tgz | head -1)"
          echo "Validating tarball: ${tarball}"
          contents="$(tar -tzf "${tarball}")"

          required_files=(
            "package/package.json"
            "package/dist/index.js"
            "package/dist/schema.json"
          )

          missing=0
          for f in "${required_files[@]}"; do
            if echo "${contents}" | grep -qx "${f}"; then
              echo "  OK: ${f}"
            else
              echo "  MISSING: ${f}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "Tarball is missing required files. Aborting release."
            echo "Full tarball contents:"
            echo "${contents}"
            exit 1
          fi

          echo "Tarball validation passed."

      - name: Smoke test packed tarball
        run: |
          set -euo pipefail
          tarball="$(ls artifacts/*.tgz | head -1)"
          smoke_dir="$(mktemp -d)"
          tar -xzf "${tarball}" -C "${smoke_dir}"
          node "${smoke_dir}/package/dist/index.js" --version
          echo "Smoke test passed."

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tgz
            artifacts/checksums.txt
          generate_release_notes: true
